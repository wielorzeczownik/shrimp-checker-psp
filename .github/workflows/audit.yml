name: Security Audit

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --features=fix

      - name: Cargo audit
        id: audit
        run: |
          if cargo audit --ignore RUSTSEC-2025-0044 --ignore RUSTSEC-2024-0436; then
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Cargo audit fix
        if: ${{ steps.audit.outputs.vulnerable == 'true' }}
        run: cargo audit fix

      - name: Cargo audit (verify)
        if: ${{ steps.audit.outputs.vulnerable == 'true' }}
        run: cargo audit --ignore RUSTSEC-2025-0044 --ignore RUSTSEC-2024-0436

      - name: Commit Cargo.lock
        if: ${{ steps.audit.outputs.vulnerable == 'true' }}
        uses: EndBug/add-and-commit@v10
        with:
          add: "Cargo.lock"
          default_author: github_actions
          message: "fix(deps): resolve audit advisories"
          push: true
