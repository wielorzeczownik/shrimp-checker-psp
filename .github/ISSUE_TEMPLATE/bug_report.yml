name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check if the issue already exists in [open issues](https://github.com/wielorzeczownik/shrimp-checker-psp/issues).

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - PSP-1000 (Phat)
        - PSP-2000 (Slim)
        - PSP-3000
        - PSP Go
        - PPSSPP (Windows)
        - PPSSPP (macOS)
        - PPSSPP (Linux)
        - PPSSPP (Android)
        - PPSSPP (iOS)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v0.1.0"
    validations:
      required: true
